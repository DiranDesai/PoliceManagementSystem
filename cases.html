<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Police Management System</title>
</head>
<body>
    <div class="sidebar">   
        <div>
            <img src="images/logo2.png" class="logo" alt="">
        </div>
        <ul style="list-style: none; padding: 0;">
            <li class="active">
              <a href="dashboard.html">
                <span class="material-icons">dashboard</span> Dashboard
              </a>
            </li>
            <li>
              <a href="criminal-cases.html">
                <span class="material-icons">gavel</span> Criminal Cases
              </a>
            </li>
            <li>
              <a href="duty-schedule.html">
                <span class="material-icons">schedule</span> Duty Schedule
              </a>
            </li>
            <li>
              <a href="add-officer.html">
                <span class="material-icons">person_add</span> Add Officer
              </a>
            </li>
            <li>
              <a href="duty-roster.html">
                <span class="material-icons">calendar_today</span> Duty Roster
              </a>
            </li>
            <li>
              <a href="contact.html">
                <span class="material-icons">support_agent</span> Contact/Support
              </a>
            </li>
          </ul>
    </div>
    <main>
        <div class="navbar flex align-items justify-between">
            <div>
                <input type="text">
            </div>
            <div class="flex items-center justify-between">
                <img src="images/officer1.jpg" class="officer-profile" alt="">
                <button type="button" class="signout-btn"><span class="material-icons">logout</span> SignOut </button>
            </div>
        </div>
        <div class="main-content">
            <div class="grid grid-t-3">
                <div class="search-bar">
                    <input type="text" placeholder="Search by Case Number, Officer, or Crime Type">
                    <button type="button">Search</button>
                    <select>
                        <option value="all">All Statuses</option>
                        <option value="open">Open</option>
                        <option value="closed">Closed</option>
                        <option value="in-progress">In Progress</option>
                    </select>
                </div>
            </div>
            
            <div class="cases-list">
                <h3>Criminal Cases</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Case Number</th>
                            <th>Type of Crime</th>
                            <th>Status</th>
                            <th>Officer Assigned</th>
                            <th>Date Reported</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Dynamically populated rows -->
                        <tr>
                            <td>12345</td>
                            <td>Theft</td>
                            <td><span class="status open">Open</span></td>
                            <td>Officer John Doe</td>
                            <td>2025-04-01</td>
                            <td class="actions">
                                <button>Edit</button>
                                <button>View Details</button>
                            </td>
                        </tr>
                        <!-- More rows here -->
                    </tbody>
                </table>
            </div>
            <div class="grid grid-t-2">
                
            </div>
            
        </div>
    </main>
</body>
</html>
